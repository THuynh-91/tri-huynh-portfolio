<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison Casino — Solo (client-only demo)</title>
  <!-- Inline favicon (a coral chip) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23d97757'/%3E%3Ccircle cx='16' cy='16' r='8' fill='none' stroke='%23fff' stroke-width='2' stroke-dasharray='3 3'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet"
  />

  <!-- All paths RELATIVE so the bundle works under any base (e.g. GitHub Pages /tri-huynh-portfolio/demos/casino/). -->
  <link rel="stylesheet" href="lib/theme.css" />
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="games/roulette.css" />
  <link rel="stylesheet" href="games/blackjack.css" />
  <link rel="stylesheet" href="games/slots.css" />
  <link rel="stylesheet" href="games/plinko.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <div id="toast-host" class="toast-host" aria-live="assertive"></div>
  <div id="modal-host"></div>

  <!-- ===== Shared UI helpers (verbatim from the multiplayer frontend) ===== -->
  <script src="lib/ui.js"></script>

  <!-- ===== CommonJS registry so the verbatim backend engines run in the browser ===== -->
  <script src="engine/_wrap.js"></script>

  <!-- ===== Verbatim backend engine + lib modules (auto-wrapped as CasinoCJS.register). =====
       Load order matters: a module must precede anything that require()s it. -->
  <script src="engine/rng.js"></script>
  <script src="engine/validate.js"></script>
  <script src="engine/cards.js"></script>
  <script src="engine/roulette-core.js"></script>
  <script src="engine/roulette-engine.js"></script>
  <script src="engine/blackjack-engine.js"></script>
  <script src="engine/slots-engine.js"></script>
  <script src="engine/plinko-engine.js"></script>

  <!-- Collect engine classes by gameId -->
  <script src="engine/engines-register.js"></script>

  <!-- ===== Client-only Room + Socket replacement ===== -->
  <script src="engine/local-room.js"></script>
  <script src="engine/local-socket.js"></script>

  <!-- ===== Verbatim game views (register window.CasinoGames[id]) ===== -->
  <script src="games/roulette.js"></script>
  <script src="games/blackjack.js"></script>
  <script src="games/slots.js"></script>
  <script src="games/plinko.js"></script>

  <!-- ===== Solo app controller ===== -->
  <script src="engine/app-solo.js"></script>
</body>
</html>
