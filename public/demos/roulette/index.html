<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>European Roulette Table</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>European Roulette</h1>
    <div class="bank">
      <div class="bank-item">
        <span class="label">Balance</span>
        <span id="balance" class="value">$1000</span>
      </div>
      <div class="bank-item">
        <span class="label">On Table</span>
        <span id="staked" class="value">$0</span>
      </div>
      <div class="bank-item">
        <span class="label">Last Win</span>
        <span id="lastwin" class="value">$0</span>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="wheel-side">
      <div id="wheel-container">
        <div class="wheel-pointer" aria-hidden="true"></div>
        <canvas id="roulette-wheel" width="420" height="420"></canvas>
      </div>
      <div id="result-banner" class="result-banner hidden">
        <span id="result-number">0</span>
      </div>
      <div id="history" class="history"></div>
    </section>

    <section class="table-side">
      <div class="chips" id="chips">
        <span class="chips-label">Chip:</span>
        <!-- chip buttons injected by JS -->
      </div>

      <div class="felt">
        <div class="bet-grid" id="bet-grid">
          <!-- 0, number grid, columns injected by JS -->
        </div>
        <div class="outside" id="outside">
          <!-- dozens + even-money bets injected by JS -->
        </div>
      </div>

      <div class="controls">
        <button id="spin-button" class="btn primary" disabled title="Place a bet to spin">SPIN</button>
        <button id="undo-button" class="btn" disabled>Undo</button>
        <button id="clear-button" class="btn" disabled>Clear Bets</button>
        <button id="rebet-button" class="btn" disabled>Rebet</button>
      </div>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="roulette-core.js"></script>
  <script src="script.js"></script>
</body>
</html>
