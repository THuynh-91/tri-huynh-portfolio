<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" fill="none">
  <defs>
    <clipPath id="shirt">
      <path d="M16 150 C16 118 30 106 60 106 C90 106 104 118 104 150 Z"/>
    </clipPath>
  </defs>

  <!-- striped tee (indigo + white, original palette, not Waldo's red/white) -->
  <g clip-path="url(#shirt)">
    <rect x="0" y="104" width="120" height="56" fill="#ffffff"/>
    <rect x="0" y="110" width="120" height="8" fill="#6366f1"/>
    <rect x="0" y="126" width="120" height="8" fill="#6366f1"/>
    <rect x="0" y="142" width="120" height="8" fill="#6366f1"/>
  </g>

  <!-- neck -->
  <rect x="51" y="90" width="18" height="20" rx="7" fill="#eab98f"/>

  <!-- head -->
  <circle cx="60" cy="62" r="33" fill="#f6cda6"/>

  <!-- hair tufts -->
  <path d="M30 58 C30 40 44 31 60 31 C76 31 90 40 90 58 C84 51 77 49 71 51 C65 45 55 45 49 51 C43 49 36 51 30 58 Z" fill="#6b4a2b"/>

  <!-- beanie (indigo) + violet pom -->
  <path d="M29 43 C29 26 43 16 60 16 C77 16 91 26 91 43 Z" fill="#6366f1"/>
  <rect x="27" y="41" width="66" height="12" rx="6" fill="#4f46e5"/>
  <circle cx="60" cy="13" r="6" fill="#8b5cf6"/>

  <!-- round glasses -->
  <circle cx="47" cy="64" r="12" fill="#ffffff" stroke="#18181b" stroke-width="3"/>
  <circle cx="73" cy="64" r="12" fill="#ffffff" stroke="#18181b" stroke-width="3"/>
  <path d="M59 64 h2" stroke="#18181b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="47" cy="64" r="3.5" fill="#18181b"/>
  <circle cx="73" cy="64" r="3.5" fill="#18181b"/>

  <!-- smile -->
  <path d="M50 80 Q60 88 70 80" stroke="#18181b" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>
