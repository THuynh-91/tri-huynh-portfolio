<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Code Problem Studio cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f1f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(99,102,241,0.16)"/>
      <stop offset="1" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" rx="28" fill="url(#bg)"/>
  <circle cx="1140" cy="40" r="380" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="674" rx="27.5" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>

  <!-- ===== motif: brackets + UML boxes + cursor block ===== -->
  <!-- big code curly bracket -->
  <g fill="none" stroke="#c7c7cf" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M640 130 q-30 0 -30 36 v54 q0 30 -30 30 q30 0 30 30 v54 q0 36 30 36"/>
  </g>
  <!-- angle brackets < > flanking (violet) -->
  <g fill="none" stroke="#8B5CF6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M600 300 L560 340 L600 380"/>
    <path d="M1090 300 L1130 340 L1090 380"/>
  </g>

  <!-- UML-style connected boxes -->
  <g fill="#ffffff" stroke="#a8a8b2" stroke-width="3">
    <!-- box A -->
    <rect x="700" y="150" width="150" height="90" rx="8"/>
    <line x1="700" y1="182" x2="850" y2="182" stroke="#c7c7cf"/>
    <line x1="718" y1="208" x2="820" y2="208" stroke="#c7c7cf"/>
    <!-- box B -->
    <rect x="940" y="150" width="150" height="90" rx="8"/>
    <line x1="940" y1="182" x2="1090" y2="182" stroke="#c7c7cf"/>
    <line x1="958" y1="208" x2="1060" y2="208" stroke="#c7c7cf"/>
    <!-- box C (indigo accent) -->
    <rect x="820" y="320" width="150" height="90" rx="8" stroke="#6366F1"/>
    <line x1="820" y1="352" x2="970" y2="352" stroke="#6366F1" stroke-opacity="0.5"/>
    <line x1="838" y1="378" x2="940" y2="378" stroke="#c7c7cf"/>
  </g>
  <!-- connectors -->
  <g stroke="#c7c7cf" stroke-width="2.5" fill="none">
    <line x1="850" y1="195" x2="940" y2="195"/>
    <path d="M775 240 V320 H820"/>
    <path d="M1015 240 V365 H970"/>
  </g>

  <!-- cursor block + code lines -->
  <g>
    <rect x="660" y="440" width="220" height="12" rx="2" fill="#c7c7cf"/>
    <rect x="660" y="468" width="300" height="12" rx="2" fill="#c7c7cf"/>
    <rect x="660" y="496" width="160" height="12" rx="2" fill="#c7c7cf"/>
    <!-- blinking cursor block (indigo) -->
    <rect x="836" y="494" width="18" height="18" rx="2" fill="#6366F1"/>
  </g>

  <!-- ===== tag chip ===== -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="74" height="40" rx="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    <text x="37" y="27" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" letter-spacing="2" fill="#6366F1">AI</text>
  </g>

  <!-- ===== title ===== -->
  <text x="64" y="560" font-family="'Space Grotesk','Inter',sans-serif" font-size="52" font-weight="600" fill="#18181b">Code Problem Studio</text>
  <text x="64" y="600" font-family="'JetBrains Mono',monospace" font-size="20" fill="#6b6b72">local AI coding tutor with UML</text>
</svg>
