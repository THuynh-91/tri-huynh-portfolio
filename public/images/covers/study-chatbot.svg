<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="RAG Study Chatbot cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f1f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(99,102,241,0.16)"/>
      <stop offset="1" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" rx="28" fill="url(#bg)"/>
  <circle cx="1140" cy="40" r="380" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="674" rx="27.5" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>

  <!-- ===== motif: embedding scatter + chat bubbles + document ===== -->
  <!-- vector/embedding space: faint connecting lines -->
  <g stroke="#c7c7cf" stroke-width="1.5" opacity="0.9">
    <line x1="650" y1="120" x2="760" y2="180"/>
    <line x1="760" y1="180" x2="880" y2="140"/>
    <line x1="760" y1="180" x2="820" y2="280"/>
    <line x1="880" y1="140" x2="980" y2="230"/>
    <line x1="820" y1="280" x2="980" y2="230"/>
    <line x1="650" y1="120" x2="700" y2="250"/>
    <line x1="700" y1="250" x2="820" y2="280"/>
    <line x1="980" y1="230" x2="1040" y2="320"/>
  </g>
  <!-- embedding points -->
  <g fill="#a8a8b2">
    <circle cx="650" cy="120" r="6"/>
    <circle cx="760" cy="180" r="6"/>
    <circle cx="880" cy="140" r="6"/>
    <circle cx="820" cy="280" r="6"/>
    <circle cx="700" cy="250" r="6"/>
    <circle cx="1040" cy="320" r="6"/>
  </g>
  <circle cx="980" cy="230" r="8" fill="#6366F1"/>

  <!-- document icon -->
  <g transform="translate(600,330)" fill="none" stroke="#a8a8b2" stroke-width="3">
    <path d="M0 0 H110 L150 40 V230 H0 Z"/>
    <path d="M110 0 V40 H150"/>
    <line x1="28" y1="80" x2="122" y2="80" stroke="#c7c7cf"/>
    <line x1="28" y1="115" x2="122" y2="115" stroke="#c7c7cf"/>
    <line x1="28" y1="150" x2="95" y2="150" stroke="#c7c7cf"/>
    <line x1="28" y1="185" x2="122" y2="185" stroke="#6366F1" stroke-width="4"/>
  </g>

  <!-- chat bubbles -->
  <g transform="translate(810,400)">
    <!-- incoming bubble (gray) -->
    <path d="M0 0 H180 a16 16 0 0 1 16 16 V70 a16 16 0 0 1 -16 16 H40 L10 110 V86 H0 a16 16 0 0 1 -16 -16 V16 a16 16 0 0 1 16 -16 Z"
          fill="none" stroke="#a8a8b2" stroke-width="3"/>
    <line x1="22" y1="32" x2="150" y2="32" stroke="#c7c7cf" stroke-width="3"/>
    <line x1="22" y1="58" x2="120" y2="58" stroke="#c7c7cf" stroke-width="3"/>
    <!-- reply bubble (indigo outline) -->
    <path d="M260 100 H120 a16 16 0 0 0 -16 16 V150 a16 16 0 0 0 16 16 H230 L260 190 V166 H260 a16 16 0 0 0 16 -16 V116 a16 16 0 0 0 -16 -16 Z"
          fill="none" stroke="#6366F1" stroke-width="3"/>
  </g>

  <!-- ===== tag chip ===== -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="74" height="40" rx="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    <text x="37" y="27" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" letter-spacing="2" fill="#6366F1">AI</text>
  </g>

  <!-- ===== title ===== -->
  <text x="64" y="560" font-family="'Space Grotesk','Inter',sans-serif" font-size="52" font-weight="600" fill="#18181b">RAG Study Chatbot</text>
  <text x="64" y="600" font-family="'JetBrains Mono',monospace" font-size="20" fill="#6b6b72">retrieval-augmented study assistant</text>
</svg>
