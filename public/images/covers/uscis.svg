<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="USCIS AI Assistant cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f1f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(99,102,241,0.16)"/>
      <stop offset="1" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="675" rx="28" fill="url(#bg)"/>
  <!-- corner glow (top-right) -->
  <circle cx="1140" cy="40" r="380" fill="url(#glow)"/>
  <!-- inner border -->
  <rect x="0.5" y="0.5" width="1199" height="674" rx="27.5" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>

  <!-- ===== motif: document + agent flow (upper-right / center) ===== -->
  <g transform="translate(690,120)" fill="none" stroke="#c7c7cf" stroke-width="3">
    <!-- document sheet -->
    <path d="M40 0 H260 L320 60 V440 H40 Z" stroke="#a8a8b2"/>
    <!-- folded corner -->
    <path d="M260 0 V60 H320" stroke="#a8a8b2"/>
    <!-- text lines -->
    <line x1="80" y1="110" x2="280" y2="110"/>
    <line x1="80" y1="150" x2="280" y2="150"/>
    <line x1="80" y1="190" x2="240" y2="190"/>
    <line x1="80" y1="250" x2="280" y2="250"/>
    <line x1="80" y1="290" x2="280" y2="290"/>
    <line x1="80" y1="330" x2="210" y2="330"/>
    <!-- indigo highlight line -->
    <line x1="80" y1="370" x2="180" y2="370" stroke="#6366F1" stroke-width="4"/>
  </g>

  <!-- checkmark badge (indigo) -->
  <g transform="translate(940,400)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#6366F1" stroke-width="4"/>
    <path d="M-20 2 L-6 18 L24 -18" fill="none" stroke="#6366F1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- agent pipeline node graph -->
  <g stroke="#a8a8b2" stroke-width="2" fill="#ffffff">
    <line x1="540" y1="510" x2="640" y2="470" stroke="#c7c7cf"/>
    <line x1="640" y1="470" x2="760" y2="520" stroke="#c7c7cf"/>
    <line x1="760" y1="520" x2="880" y2="490" stroke="#6366F1" stroke-width="2.5"/>
    <circle cx="540" cy="510" r="12"/>
    <circle cx="640" cy="470" r="12"/>
    <circle cx="760" cy="520" r="12"/>
    <circle cx="880" cy="490" r="13" fill="#6366F1" stroke="#6366F1"/>
  </g>

  <!-- ===== tag chip (top-left) ===== -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="74" height="40" rx="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    <text x="37" y="27" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" letter-spacing="2" fill="#6366F1">AI</text>
  </g>

  <!-- ===== title (lower-left) ===== -->
  <text x="64" y="560" font-family="'Space Grotesk','Inter',sans-serif" font-size="52" font-weight="600" fill="#18181b">USCIS AI Assistant</text>
  <text x="64" y="600" font-family="'JetBrains Mono',monospace" font-size="20" fill="#6b6b72">N-400 naturalization form agent</text>
</svg>
