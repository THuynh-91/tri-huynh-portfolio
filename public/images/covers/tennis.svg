<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Tennis Match Modeling cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f1f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(99,102,241,0.16)"/>
      <stop offset="1" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" rx="28" fill="url(#bg)"/>
  <circle cx="1140" cy="40" r="380" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="674" rx="27.5" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>

  <!-- ===== motif: top-down tennis court ===== -->
  <g fill="none" stroke="#a8a8b2" stroke-width="3">
    <!-- outer doubles court -->
    <rect x="640" y="90" width="380" height="470" rx="2"/>
    <!-- singles sidelines -->
    <line x1="690" y1="90" x2="690" y2="560"/>
    <line x1="970" y1="90" x2="970" y2="560"/>
    <!-- net (center, violet) -->
    <line x1="640" y1="325" x2="1020" y2="325" stroke="#8B5CF6" stroke-width="3"/>
    <!-- service lines -->
    <line x1="690" y1="210" x2="970" y2="210" stroke="#c7c7cf"/>
    <line x1="690" y1="440" x2="970" y2="440" stroke="#c7c7cf"/>
    <!-- center service line -->
    <line x1="830" y1="210" x2="830" y2="440" stroke="#c7c7cf"/>
    <!-- center marks -->
    <line x1="830" y1="90" x2="830" y2="110" stroke="#c7c7cf"/>
    <line x1="830" y1="540" x2="830" y2="560" stroke="#c7c7cf"/>
  </g>

  <!-- ===== scatter + regression trend line ===== -->
  <!-- regression line (indigo, rising) -->
  <line x1="660" y1="500" x2="1000" y2="160" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  <!-- scatter points (gray) -->
  <g fill="#a8a8b2">
    <circle cx="680" cy="470" r="6"/>
    <circle cx="730" cy="450" r="6"/>
    <circle cx="770" cy="400" r="6"/>
    <circle cx="820" cy="380" r="6"/>
    <circle cx="850" cy="330" r="6"/>
    <circle cx="900" cy="300" r="6"/>
    <circle cx="930" cy="240" r="6"/>
    <circle cx="980" cy="200" r="6"/>
  </g>
  <!-- highlighted prediction point (indigo) -->
  <circle cx="1000" cy="160" r="9" fill="#6366F1"/>
  <circle cx="1000" cy="160" r="16" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>

  <!-- ===== tag chip (ML) ===== -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="74" height="40" rx="12" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    <text x="37" y="27" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" letter-spacing="2" fill="#6366F1">ML</text>
  </g>

  <!-- ===== title ===== -->
  <text x="64" y="560" font-family="'Space Grotesk','Inter',sans-serif" font-size="52" font-weight="600" fill="#18181b">Tennis Match Modeling</text>
  <text x="64" y="600" font-family="'JetBrains Mono',monospace" font-size="20" fill="#6b6b72">predicting ATP match winners</text>
</svg>
